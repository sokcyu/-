<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>cj스튜디오 관리자</title><style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI","Noto Sans KR",sans-serif;background:#0b1020;color:#fff}
main{max-width:860px;margin:auto;padding:20px}
h1{text-align:center}h2{margin:0 0 12px;font-size:19px}
.card{background:#151d31;border:1px solid #2d3955;border-radius:18px;padding:18px;margin-bottom:14px}
input,select,button{width:100%;padding:13px;margin-top:9px;border-radius:11px;font:inherit}
input,select{background:#0b1220;color:#fff;border:1px solid #354462}
button{border:0;color:#fff;font-weight:800;cursor:pointer}
.primary{background:#7c3aed}.ok{background:#16a34a}.no{background:#dc2626}.secondary{background:#334155}.del{background:#6b7280}.yt{background:#e11d48}
.hidden{display:none}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.item{background:#0b1220;border:1px solid #33415e;border-radius:14px;padding:14px;margin-top:10px}
.song{font-size:18px;font-weight:900}.muted{color:#aab4c8;font-size:13px;margin-top:4px;line-height:1.5}
.badge{display:inline-block;margin-top:8px;padding:5px 9px;border-radius:999px;background:#29364f}
.notice,.statusbox{margin-top:10px;padding:10px;background:#172033;border-radius:10px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
button:disabled{opacity:.38;cursor:not-allowed;filter:grayscale(1)}
.empty{text-align:center;color:#9ca3af;padding:20px}
.topbar{display:flex;justify-content:space-between;gap:10px;align-items:center}
.topbar button{width:auto;margin:0}
.counts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.count{text-align:center;padding:10px;background:#0b1220;border-radius:12px;border:1px solid #33415e}
.count strong{display:block;font-size:22px}
.toolbar{display:grid;grid-template-columns:2fr 1fr;gap:8px}
@media(max-width:580px){.grid2,.toolbar,.actions{grid-template-columns:1fr}.counts{grid-template-columns:1fr 1fr}.topbar{align-items:flex-start}}
</style></head>
<body><main><h1>🎛️ cj스튜디오 관리자</h1>
<section id="login" class="card"><h2>🔐 관리자 로그인</h2><input id="pw" type="password" placeholder="관리자 비밀번호"><button id="loginBtn" class="primary">로그인</button><p class="muted">초기 비밀번호: 1234</p></section>
<section id="app" class="hidden">

<section class="card">
<h2>👥 이용자 계정 관리</h2>
<div class="toolbar"><input id="userSearch" placeholder="이름 또는 아이디 검색"><select id="userFilter"><option value="전체">전체 상태</option><option>승인 대기</option><option>승인</option><option>정지</option></select></div>
<div id="userList"></div>
</section>

<section class="card">
<h2>⏰ 신청 접수 예약시간</h2>
<div class="grid2"><label>시작<input id="startTime" type="datetime-local"></label><label>종료<input id="endTime" type="datetime-local"></label></div>
<button id="saveSchedule" class="primary">예약시간 저장</button>
<button id="openNow" class="ok">지금부터 1시간 접수</button>
<button id="closeNow" class="no">즉시 마감</button><div id="scheduleStatus" class="statusbox"></div>
</section>

<section class="card">
<h2>📋 신청곡 관리</h2>
<div class="counts"><div class="count"><span class="muted">전체</span><strong id="totalCount">0</strong></div><div class="count"><span class="muted">대기</span><strong id="waitCount">0</strong></div><div class="count"><span class="muted">승인</span><strong id="okCount">0</strong></div><div class="count"><span class="muted">거절</span><strong id="noCount">0</strong></div></div>
<div class="toolbar"><input id="search" placeholder="노래, 가수, 신청자 검색"><select id="filter"><option value="전체">전체 상태</option><option>대기</option><option>승인</option><option>거절</option><option>삭제 처리</option></select></div>
<div id="list"></div>
</section>
</section></main>
<script>
const USERS_KEY="cj_users_v1",REQUEST_KEY="cj_simple_requests",SCHEDULE_KEY="cj_request_schedule",PASSWORD="1234";
const $=s=>document.querySelector(s);
function users(){try{return JSON.parse(localStorage.getItem(USERS_KEY))||[]}catch{return[]}}
function saveUsers(v){localStorage.setItem(USERS_KEY,JSON.stringify(v));renderUsers()}
function requests(){try{return JSON.parse(localStorage.getItem(REQUEST_KEY))||[]}catch{return[]}}
function saveRequests(v){localStorage.setItem(REQUEST_KEY,JSON.stringify(v));renderRequests()}
function esc(v=""){return String(v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
function fmt(v){return new Intl.DateTimeFormat("ko-KR",{dateStyle:"short",timeStyle:"short"}).format(new Date(v))}
function toLocalInput(d){const z=n=>String(n).padStart(2,"0");return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}T${z(d.getHours())}:${z(d.getMinutes())}`}
$("#loginBtn").onclick=()=>{if($("#pw").value===PASSWORD){$("#login").classList.add("hidden");$("#app").classList.remove("hidden");loadSchedule();renderUsers();renderRequests()}else alert("비밀번호가 틀렸습니다.")}

function setUserStatus(id,status){const data=users(),u=data.find(x=>x.id===id);if(!u)return;u.status=status;saveUsers(data)}
function resetPassword(id){const next=prompt("새 비밀번호를 4자 이상 입력하세요.","1234");if(!next)return;if(next.length<4){alert("4자 이상 입력하세요.");return}const data=users(),u=data.find(x=>x.id===id);if(!u)return;u.password=next;saveUsers(data);alert("비밀번호를 변경했습니다.")}
function deleteUser(id){if(!confirm("이용자 계정을 삭제할까요? 신청 내역은 유지됩니다."))return;saveUsers(users().filter(x=>x.id!==id))}
function renderUsers(){
 const q=$("#userSearch").value.trim().toLowerCase(),f=$("#userFilter").value;
 const data=users().filter(u=>(!q||[u.id,u.name].join(" ").toLowerCase().includes(q))&&(f==="전체"||u.status===f));
 $("#userList").innerHTML=data.length?data.map(u=>`<div class="item"><div class="song">${esc(u.name)}</div><div class="muted">아이디: ${esc(u.id)}<br>가입: ${u.createdAt?fmt(u.createdAt):""}</div><span class="badge">${esc(u.status)}</span><div class="actions">
 <button class="ok" onclick="setUserStatus('${esc(u.id)}','승인')">✅ 승인</button>
 <button class="no" onclick="setUserStatus('${esc(u.id)}','정지')">⛔ 정지</button>
 <button class="secondary" onclick="resetPassword('${esc(u.id)}')">🔑 비밀번호 초기화</button>
 <button class="del" onclick="deleteUser('${esc(u.id)}')">🗑 계정 삭제</button></div></div>`).join(""):'<div class="empty">이용자가 없습니다.</div>';
}
$("#userSearch").addEventListener("input",renderUsers);$("#userFilter").addEventListener("change",renderUsers);

function getSchedule(){try{return JSON.parse(localStorage.getItem(SCHEDULE_KEY))||{}}catch{return{}}}
function loadSchedule(){const s=getSchedule();if(s.start)$("#startTime").value=s.start;if(s.end)$("#endTime").value=s.end;renderSchedule()}
function renderSchedule(){const s=getSchedule(),now=Date.now();if(!s.start||!s.end){$("#scheduleStatus").innerHTML="예약시간이 없습니다.";return}const st=new Date(s.start).getTime(),en=new Date(s.end).getTime();$("#scheduleStatus").innerHTML=now<st?`🟡 ${fmt(s.start)}부터 접수`:now<=en?`🟢 접수 중 · ${fmt(s.end)}까지`:`🔴 접수 마감`}
$("#saveSchedule").onclick=()=>{const start=$("#startTime").value,end=$("#endTime").value;if(!start||!end||new Date(end)<=new Date(start)){alert("올바른 시작·종료 시간을 입력하세요.");return}localStorage.setItem(SCHEDULE_KEY,JSON.stringify({start,end}));renderSchedule();alert("저장했습니다.")}
$("#openNow").onclick=()=>{const n=new Date(),e=new Date(n.getTime()+3600000),s={start:toLocalInput(n),end:toLocalInput(e)};localStorage.setItem(SCHEDULE_KEY,JSON.stringify(s));loadSchedule()}
$("#closeNow").onclick=()=>{const n=new Date(),b=new Date(n.getTime()-60000),s={start:toLocalInput(b),end:toLocalInput(n)};localStorage.setItem(SCHEDULE_KEY,JSON.stringify(s));loadSchedule()}

function updateRequest(id,status){const data=requests(),t=data.find(x=>x.id===id);if(!t)return;if(t.status!=="대기"){alert("이미 처리된 신청입니다.");return}t.status=status;t.notice=status==="승인"?"승인되었습니다. 음원 발매 이후 공고문을 발송하겠습니다.":"거절되었습니다. 다른 음원을 말씀해 주세요.";saveRequests(data)}
function removeRequest(id){if(!confirm("삭제 처리할까요?"))return;const data=requests(),t=data.find(x=>x.id===id);if(!t)return;t.status="삭제 처리";t.notice="음원이 부적절함으로 처리되어 삭제되었습니다. 다시 이용해 주시길 바랍니다.";saveRequests(data)}
function youtube(song,artist){window.open("https://www.youtube.com/results?search_query="+encodeURIComponent(artist+" "+song),"_blank")}
function renderRequests(){
 const all=requests();$("#totalCount").textContent=all.length;$("#waitCount").textContent=all.filter(x=>x.status==="대기").length;$("#okCount").textContent=all.filter(x=>x.status==="승인").length;$("#noCount").textContent=all.filter(x=>x.status==="거절").length;
 const q=$("#search").value.trim().toLowerCase(),f=$("#filter").value,data=all.filter(x=>(!q||[x.name,x.userId,x.song,x.artist].join(" ").toLowerCase().includes(q))&&(f==="전체"||x.status===f));
 $("#list").innerHTML=data.length?data.map(x=>`<div class="item"><div class="song">${esc(x.song)}</div><div class="muted">${esc(x.artist)} · ${esc(x.name)} (${esc(x.userId||"관리자접수")})<br>${x.createdAt?fmt(x.createdAt):""}</div><span class="badge">${esc(x.status)}</span>${x.notice?`<div class="notice">📢 ${esc(x.notice)}</div>`:""}<div class="actions">
 <button class="ok" onclick="updateRequest(${x.id},'승인')" ${x.status!=="대기"?"disabled":""}>✅ 승인</button>
 <button class="no" onclick="updateRequest(${x.id},'거절')" ${x.status!=="대기"?"disabled":""}>❌ 거절</button>
 <button class="yt" onclick="youtube('${esc(x.song)}','${esc(x.artist)}')">▶ 유튜브</button>
 <button class="del" onclick="removeRequest(${x.id})">🗑 삭제 처리</button></div></div>`).join(""):'<div class="empty">신청곡이 없습니다.</div>';
}
$("#search").addEventListener("input",renderRequests);$("#filter").addEventListener("change",renderRequests);
setInterval(renderSchedule,1000);window.addEventListener("storage",()=>{renderUsers();renderRequests();renderSchedule()});
</script></body></html>
